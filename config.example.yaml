# jobscope configuration. Copy to config.yaml (or run `python -m jobscope init`).
# Secrets never live here -- put API keys / passwords in .env (see .env.example).

profile:
  resume_path: "data/resume.md"      # your resume: .md / .json (JSON Resume) / .pdf / .txt
  primary_resume: ""                  # name of your default base resume (blank = auto)
  # Multi-resume: import several bases and matching auto-picks the best per job, e.g.
  #   python -m jobscope resume import research.md   --name research
  #   python -m jobscope resume import consulting.md --name consulting
  full_name: ""                       # used to pre-fill application answers
  email: ""
  phone: ""
  location: ""
  links: {}                           # e.g. {linkedin: "...", github: "...", website: "..."}

search:
  # JobSpy sites: indeed, linkedin, google, glassdoor, bayt, naukri.
  # zip_recruiter omitted by default -- Cloudflare WAF returns 403 (re-add if you use proxies).
  sites: ["indeed", "linkedin", "google"]
  terms:
    - "application security engineer"
    - "security engineer"
    - "product security"
  google_term: ""                     # optional google-jobs specific phrasing
  location: "Remote"
  country_indeed: "USA"
  results_wanted: 25
  hours_old: 168                      # last 7 days
  is_remote: true
  distance: 50
  linkedin_fetch_description: true    # slower, but gets full description + salary
  proxies: []                         # optional ['user:pass@host:port', ...] to protect your IP on big scans
  # Optional: run several searches in one scan. Each profile reuses the fields
  # above and overrides only what it lists (location / is_remote / hours_old /
  # country_indeed / results_wanted). Handy to cover BOTH remote and on-site.
  # Leave empty for a single search from the fields above.
  profiles: []
  #   - name: "remote"
  #     location: "Remote"
  #     is_remote: true
  #     hours_old: 168
  #   - name: "onsite-local"
  #     location: "India"        # or a city, e.g. "Pune, Maharashtra"
  #     is_remote: false         # include on-site / hybrid
  #     hours_old: 720           # last 30 days
  #     country_indeed: "India"
  # Optional: pull specific companies' PUBLIC job boards (Greenhouse / Lever /
  # Ashby) directly -- no login, no key. This surfaces roles at well-funded
  # companies (e.g. unicorns) that keyword search on LinkedIn/Indeed rarely ranks
  # into view. Board jobs are filtered by your locations + terms, then merged.
  # Entries are a known name (see jobscope/ats.py COMPANY_BOARDS) or an explicit
  # "Name|provider|slug" override. Leave empty to skip ATS boards.
  companies: []
  #   - databricks              # known: resolved to greenhouse/databricks
  #   - wiz
  #   - "Acme|lever|acme"       # explicit provider + board slug

match:
  # Deterministic fit score = 100 * weighted sum, minus a ghost/scam penalty.
  weights:
    skills: 0.34
    title: 0.18
    seniority: 0.12
    comp: 0.10
    location: 0.10
    recency: 0.04
    company: 0.12                      # prestige boost (curated FAANG/top/security tiers)
  min_salary: 0                       # drop jobs whose max salary is below this (0 = off)
  target_seniority: ""                # "" = infer from resume; else intern/junior/mid/senior/staff -> down-ranks roles above it (asymmetric)
  ai_seniority_tiebreak: true         # when ai.enabled: AI-classify ambiguous non-Skip postings (no title level / no stated years)
  ai_tiebreak_max_calls: 0            # 0 = unbounded; else cap AI classify calls per match run
  ai_score_review: false              # off by default; needs quorum.enabled. CLI-only judge second-opinion on boundary jobs
  ai_score_margin: 8                  # review jobs within this many points of a tier cut
  ai_score_max_calls: 12              # 0 = unbounded; else cap judge calls per match run
  prefer_locations: []                # e.g. ["Remote", "India", "Bengaluru"] -> full location score
  prefer_companies: []                # your own must-boost employers (substring match)
  prefer_company_size: "any"          # any | large | mid | small -> bias ranking by headcount
  tiers: {strong: 75, good: 55, stretch: 35}
  ghost_penalty: 15                   # points subtracted when scam/ghost-job signals fire
  remote_scope_strict: false          # down-rank geo-restricted remote (e.g. "Remote in Ireland") whose region isn't in your prefer_locations/country

filters:                              # jobs matching these are forced to Skip (⛔) with a reason
  needs_sponsorship: false            # true => drop roles that state "no visa sponsorship"
  exclude_clearance: false            # true => drop US security-clearance / citizenship-only roles
  block_companies: []                 # substring match on company (e.g. staffing agencies)
  block_keywords: []                  # substring match on title+description
  block_title_keywords: []            # substring match on title only
  max_age_days: 0                     # 0 = off; else drop postings older than N days
  max_years_experience: 0             # 0 = off; else drop roles asking clearly more (Senior/Staff titles, "N+ years") than this cap

enrich:
  compensation: true                  # JobSpy salary + Levels.fyi
  stock: true                         # yfinance price / IPO status / peer comparison (no key)
  reddit: true                        # old.reddit JSON search (no key)
  news: true                          # company news via RSS
  glassdoor: false                    # best-effort rating (may require the browser)
  contacts: true                      # legit-only referral leads + outreach drafts
  brief: true                         # blunt, risk-forward company brief (no marketing fluff)
  news_feeds: []                      # optional extra RSS feed URLs
  top_n: 10                           # only enrich the top N ranked jobs

ai:
  enabled: false                      # false => deterministic only (still fully usable)
  provider: "groq"                    # groq | gemini | openrouter | ollama | openai
  base_url: "https://api.groq.com/openai/v1"
  model: "llama-3.3-70b-versatile"
  temperature: 0.3
  max_tokens: 1200
  api_key_env: "JOBSCOPE_AI_API_KEY"  # set this in .env

# Optional: route the AI layer through a quorum deliberation (multi-model or
# self-refine) instead of one model. Off by default; needs the `quorum` package
# installed (pip install -e path\to\quorum). Set enabled: true to use it.
quorum:
  enabled: false
  strategy: refine                    # default: refine | debate | council | moa | ensemble
  # Per-task overrides (only used when enabled). Set to "" to inherit `strategy`,
  # or e.g. "refine" to minimise cost on free-tier keys.
  strategy_generative: council        # summary / cover letter / "why here"
  strategy_classify: ensemble         # seniority + email labels (self-consistency)
  # members:                          # optional extra models; omit to self-refine ai.model
  #   - { name: a, provider: openrouter, model: google/gemma-4-31b-it:free }

email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  from_addr: ""
  to_addr: ""
  password_env: "JOBSCOPE_SMTP_PASSWORD"

# Optional: monitor Gmail inbox(es) for the job-application process (confirmations,
# rejections, interviews, offers) and feed the application funnel. Uses read-only
# IMAP with a Gmail APP PASSWORD (requires 2-Step Verification on the account) and
# never marks mail as read. App passwords live in .env, referenced by env-var name.
#   python -m jobscope inbox            # sync new mail (incremental)
#   python -m jobscope inbox --dry-run  # classify + print, write nothing
inbox:
  enabled: false
  accounts: []
  #   - email: "you@gmail.com"
  #     password_env: "JOBSCOPE_GMAIL_APP_PW"       # 16-char app password, set in .env
  #   - email: "you.two@gmail.com"
  #     password_env: "JOBSCOPE_GMAIL_APP_PW_2"
  #     lookback_days: 7               # optional: per-account override of the global lookback below
  imap_host: "imap.gmail.com"
  imap_port: 993
  folder: "INBOX"
  lookback_days: 90                   # first run scans this far back; later runs are incremental
  store_snippets: false               # persist a short email-body excerpt? off = classify in memory then discard (less PII at rest)

apply:
  assist: false                       # opt-in: assisted fill of PUBLIC ATS forms, stops before submit
  package_dir: "data/applications"
  auto_prep_top: 3                    # in `pipeline`, auto-build packages for the top N Strong/Good jobs
  followup_days: 7                    # `track` nudges you to follow up on applications older than this

output:
  db_path: "data/jobscope.db"
  dashboard_path: "data/dashboard.html"
  public_dashboard_path: "data/public-dashboard.html"   # redacted copy for `dashboard --public` / GitHub Pages
