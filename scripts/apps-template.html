<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="referrer" content="no-referrer">
<meta name="color-scheme" content="dark">
<title>jobscope · applications</title>
<style>
  :root {
    --bg: #0a0a0b; --panel: #141417; --panel2: #1c1c21; --line: #2a2a31;
    --fg: #e7e7ea; --dim: #9a9aa5; --accent: #8b5cf6;
    --neon-cyan: #27d9ff; --neon-blue: #2f7bff; --neon-violet: #8b5cf6; --neon-emerald: #22e6a8;
    --applied: #3b82f6; --interview: #f59e0b; --offer: #22c55e;
    --rejected: #ef4444; --prepared: #64748b; --new: #64748b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; background: var(--bg); color: var(--fg);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { padding: env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom)); max-width: 720px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 700; margin: 20px 0 2px; letter-spacing: .2px; }
  .sub { color: var(--dim); font-size: 12.5px; margin-bottom: 18px; }
  /* gate */
  #gate { min-height: 72vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; text-align: center; }
  #gate .lock { font-size: 34px; }
  #gate p { color: var(--dim); margin: 0; max-width: 320px; }
  .row { display: flex; gap: 8px; width: 100%; max-width: 340px; }
  input[type=password] { flex: 1; background: var(--panel); border: 1px solid var(--line);
    color: var(--fg); border-radius: 10px; padding: 12px 14px; font-size: 16px; outline: none; }
  input[type=password]:focus { border-color: var(--accent); }
  button { background: var(--accent); color: #fff; border: 0; border-radius: 10px;
    padding: 12px 16px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:disabled { opacity: .6; cursor: default; }
  .err { color: var(--rejected); font-size: 13px; min-height: 18px; }
  /* funnel */
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 20px; }
  .chip { background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 12px; font-size: 13px; display: flex; gap: 7px; align-items: center; }
  .chip b { font-variant-numeric: tabular-nums; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .metrics { color: var(--dim); font-size: 12.5px; margin: -8px 0 18px; }
  /* pipeline funnel graph */
  .chart-wrap { margin: 2px 0 22px; }
  .chart-h { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim); margin-bottom: 11px; }
  .chart { display: flex; flex-direction: column; gap: 11px; }
  .bar-row { display: flex; flex-direction: column; gap: 5px; }
  .bar-top { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
  .bar-label { color: var(--fg); }
  .bar-count { color: var(--dim); font-variant-numeric: tabular-nums; }
  .bar-track { height: 10px; background: var(--panel2); border-radius: 999px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 999px; width: 0; transition: width .65s cubic-bezier(.22,.61,.36,1); }
  @keyframes railPulse {
    0%, 100% { box-shadow: 0 0 10px color-mix(in srgb, var(--status-color) 34%, transparent); }
    50% { box-shadow: 0 0 24px color-mix(in srgb, var(--status-color) 72%, transparent); }
  }
  /* cards */
  .card { --spot-x: 50%; --spot-y: 50%; --status-color: var(--accent);
    position: relative; isolation: isolate; overflow: hidden;
    background:
      linear-gradient(color-mix(in srgb, var(--panel) 88%, #000 12%), color-mix(in srgb, var(--panel) 94%, var(--neon-blue) 6%)) padding-box,
      linear-gradient(128deg, var(--neon-cyan), var(--neon-blue), var(--neon-violet), var(--neon-emerald)) border-box;
    border: 1px solid transparent; border-radius: 14px;
    padding: 13px 14px 13px 16px; margin-bottom: 10px;
    box-shadow: 0 0 34px -28px var(--status-color); }
  .card::before { content: ""; position: absolute; inset: 10px auto 10px 0; width: 3px;
    border-radius: 999px; background: var(--status-color);
    box-shadow: 0 0 16px color-mix(in srgb, var(--status-color) 58%, transparent); }
  .card::after { content: ""; position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(180px circle at var(--spot-x) var(--spot-y), color-mix(in srgb, var(--status-color) 22%, transparent), transparent 58%);
    opacity: 0; transition: opacity .22s ease-out; }
  .card:hover::after { opacity: 1; }
  .card.status-offer::before, .card.status-interview::before { animation: railPulse 2.2s ease-in-out infinite; }
  .card > * { position: relative; z-index: 1; }
  .card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .co { font-weight: 650; }
  .date { color: var(--dim); font-size: 12px; white-space: nowrap; font-variant-numeric: tabular-nums; }
  .title { color: var(--dim); font-size: 13.5px; margin-top: 1px; }
  .meta { display: flex; gap: 8px; align-items: center; margin-top: 9px; flex-wrap: wrap; }
  .badge { font-size: 11.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
    text-transform: capitalize; border: 1px solid transparent; }
  .src { font-size: 11px; color: var(--dim); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }
  .tl-btn { margin-left: auto; background: none; border: 1px solid var(--line); color: var(--dim);
    font-size: 11.5px; padding: 3px 9px; border-radius: 999px; font-weight: 500; }
  .tl { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 9px; display: none; }
  .tl.open { display: block; }
  .ev { display: flex; gap: 8px; font-size: 12.5px; color: var(--dim); padding: 3px 0; }
  .ev .d { white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 82px; }
  .ev .s { color: var(--fg); text-transform: capitalize; min-width: 92px; }
  .ev .subj { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .group-h { font-size: 12px; text-transform: uppercase; letter-spacing: .6px; color: var(--dim);
    margin: 18px 0 8px; display: flex; gap: 8px; align-items: center; }
  .empty { color: var(--dim); text-align: center; padding: 40px 0; }
  .foot { color: var(--dim); font-size: 11px; text-align: center; margin-top: 26px; }
</style>
</head>
<body>
  <form id="gate" autocomplete="off">
    <div class="lock">&#128274;</div>
    <h1 style="margin:0">jobscope &middot; applications</h1>
    <p>This page is end-to-end encrypted. Enter your passphrase to decrypt it in your browser.</p>
    <div class="row">
      <input id="pass" type="password" placeholder="Passphrase" autocomplete="current-password" autofocus>
      <button id="go" type="submit">Unlock</button>
    </div>
    <div id="err" class="err"></div>
  </form>

  <main id="app" hidden>
    <h1>Applications</h1>
    <div id="sub" class="sub"></div>
    <div id="chips" class="chips"></div>
    <div id="metrics" class="metrics"></div>
    <div class="chart-wrap"><div class="chart-h">Pipeline funnel</div><div id="chart" class="chart"></div></div>
    <div id="list"></div>
    <div class="foot">Decrypted locally in your browser &middot; nothing was sent anywhere.</div>
  </main>

<script>
window.__ENC__ = __ENC_BLOB__;
</script>
<script>
(function () {
  "use strict";
  var ENC = window.__ENC__ || {};
  var STATUS_ORDER = ["offer", "interview", "applied", "prepared", "new", "rejected"];
  var COLORS = { applied: "--applied", interview: "--interview", offer: "--offer",
                 rejected: "--rejected", prepared: "--prepared", new: "--new" };

  function b64ToBytes(b64) {
    var bin = atob(b64), out = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
    return out;
  }
  function color(status) {
    var v = getComputedStyle(document.documentElement).getPropertyValue(COLORS[status] || "--prepared");
    return (v || "#64748b").trim();
  }
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fmtDate(s) {
    if (!s) return "";
    var d = new Date(s);
    if (isNaN(d)) return String(s).slice(0, 10);
    return d.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
  }

  async function decrypt(passphrase) {
    var enc = new TextEncoder();
    var baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64ToBytes(ENC.salt), iterations: ENC.iter, hash: "SHA-256" },
      baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
    var pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64ToBytes(ENC.iv) }, key, b64ToBytes(ENC.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  }

  function render(data) {
    var funnel = data.funnel || {};
    var apps = (data.applications || []).slice();

    var chips = document.getElementById("chips");
    chips.innerHTML = "";
    STATUS_ORDER.forEach(function (st) {
      if (!(st in funnel)) return;
      var el = document.createElement("div");
      el.className = "chip";
      el.innerHTML = '<span class="dot" style="background:' + color(st) + '"></span>' +
                     '<span style="text-transform:capitalize">' + esc(st) + '</span><b>' + funnel[st] + "</b>";
      chips.appendChild(el);
    });

    var submitted = apps.length;
    var responded = apps.filter(function (a) { return a.status && a.status !== "applied" && a.status !== "prepared" && a.status !== "new"; }).length;
    var interviews = apps.filter(function (a) { return a.status === "interview" || a.status === "offer"; }).length;
    var pct = function (n) { return submitted ? Math.round((n / submitted) * 100) : 0; };
    document.getElementById("metrics").textContent =
      submitted + " tracked \u00B7 " + pct(responded) + "% response \u00B7 " + pct(interviews) + "% interview+";

    var offers = apps.filter(function (a) { return a.status === "offer"; }).length;
    var cvar = function (v) { return (getComputedStyle(document.documentElement).getPropertyValue(v) || "").trim() || "#8b5cf6"; };
    var chart = document.getElementById("chart");
    chart.innerHTML = "";
    [["Applied", submitted, cvar("--applied")], ["Responded", responded, cvar("--accent")],
     ["Interview", interviews, cvar("--interview")], ["Offer", offers, cvar("--offer")]
    ].forEach(function (st) {
      var row = document.createElement("div");
      row.className = "bar-row";
      row.innerHTML = '<div class="bar-top"><span class="bar-label">' + st[0] + '</span>' +
                      '<span class="bar-count">' + st[1] + " \u00B7 " + pct(st[1]) + '%</span></div>' +
                      '<div class="bar-track"><div class="bar-fill" style="background:' + st[2] + '"></div></div>';
      chart.appendChild(row);
      var fill = row.querySelector(".bar-fill");
      requestAnimationFrame(function () { fill.style.width = ((st[1] / Math.max(submitted, 1)) * 100) + "%"; });
    });

    var order = {}; STATUS_ORDER.forEach(function (s, i) { order[s] = i; });
    apps.sort(function (a, b) {
      var d = (order[a.status] == null ? 99 : order[a.status]) - (order[b.status] == null ? 99 : order[b.status]);
      if (d) return d;
      return String(b.applied_at || b.updated || "").localeCompare(String(a.applied_at || a.updated || ""));
    });

    var list = document.getElementById("list");
    list.innerHTML = "";
    if (!apps.length) { list.innerHTML = '<div class="empty">No applications tracked yet.</div>'; return; }

    var curStatus = null;
    apps.forEach(function (a, idx) {
      if (a.status !== curStatus) {
        curStatus = a.status;
        var h = document.createElement("div");
        h.className = "group-h";
        h.innerHTML = '<span class="dot" style="background:' + color(a.status) + '"></span>' + esc(a.status || "other");
        list.appendChild(h);
      }
      var tl = a.timeline || [];
      var card = document.createElement("div");
      card.className = "card status-" + String(a.status || "new").replace(/[^a-z0-9_-]/gi, "").toLowerCase();
      card.style.setProperty("--status-color", color(a.status));
      var html = '<div class="top"><span class="co">' + esc(a.company || "(unknown)") + "</span>" +
                 '<span class="date">' + esc(fmtDate(a.applied_at || a.updated)) + "</span></div>";
      if (a.title) html += '<div class="title">' + esc(a.title) + "</div>";
      html += '<div class="meta"><span class="badge" style="color:' + color(a.status) +
              ";background:" + color(a.status) + '22;border-color:' + color(a.status) + '55">' + esc(a.status || "other") + "</span>";
      if (a.source) html += '<span class="src">' + esc(a.source) + "</span>";
      if (tl.length) html += '<button class="tl-btn" data-i="' + idx + '">' + tl.length + " email" + (tl.length > 1 ? "s" : "") + "</button>";
      html += "</div>";
      if (tl.length) {
        html += '<div class="tl" id="tl' + idx + '">';
        tl.forEach(function (e) {
          html += '<div class="ev"><span class="d">' + esc(fmtDate(e.date)) + '</span><span class="s">' +
                  esc(e.signal || "") + '</span><span class="subj">' + esc(e.subject || "") + "</span></div>";
        });
        html += "</div>";
      }
      card.innerHTML = html;
      list.appendChild(card);
    });

    list.addEventListener("click", function (ev) {
      var btn = ev.target.closest(".tl-btn");
      if (!btn) return;
      var box = document.getElementById("tl" + btn.getAttribute("data-i"));
      if (box) box.classList.toggle("open");
    });

    list.addEventListener("pointermove", function (ev) {
      var card = ev.target.closest(".card");
      if (!card) return;
      var rect = card.getBoundingClientRect();
      card.style.setProperty("--spot-x", (ev.clientX - rect.left) + "px");
      card.style.setProperty("--spot-y", (ev.clientY - rect.top) + "px");
    });

    document.getElementById("sub").textContent = "Updated " + fmtDate(data.generated);
  }

  var gate = document.getElementById("gate"), err = document.getElementById("err"), go = document.getElementById("go");
  gate.addEventListener("submit", async function (e) {
    e.preventDefault();
    err.textContent = "";
    go.disabled = true;
    var pass = document.getElementById("pass").value;
    try {
      var data = await decrypt(pass);
      gate.hidden = true;
      document.getElementById("app").hidden = false;
      render(data);
    } catch (ex) {
      err.textContent = "Wrong passphrase.";
      go.disabled = false;
    }
  });
})();
</script>
</body>
</html>
