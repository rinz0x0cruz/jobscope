name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core deps only; browser not needed for tests)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests feedparser markdown pytest
      - name: Offline selftest
        run: python -m jobscope selftest
      - name: Unit tests
        run: pytest -q
