name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core deps only; browser not needed for tests)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests feedparser markdown pytest ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Offline selftest
        run: python -m jobscope selftest
      - name: Unit tests
        run: python -m pytest -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install detect-secrets
        run: python -m pip install --upgrade pip detect-secrets
      - name: Scan tracked files for committed secrets
        run: detect-secrets-hook --baseline .secrets.baseline $(git ls-files)

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: House-style compliance (vendored house_check.py)
        run: python .github/house_check.py --strict .
