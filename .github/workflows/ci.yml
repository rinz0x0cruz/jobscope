name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (core deps + ruff; browser not needed for tests)
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests feedparser markdown pytest ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Offline selftest
        run: python -m jobscope selftest
      - name: Unit tests
        run: python -m pytest -q

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch the house-style checker
        uses: actions/checkout@v4
        with:
          repository: rinz0x0cruz/ai-agent-skills
          path: .agent-skills
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: House-style compliance (house_check.py)
        run: python .agent-skills/skills/ai-tool-builder/assets/house_check.py --strict .
